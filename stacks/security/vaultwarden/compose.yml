services:
  vaultwarden:
    image: ${VAULTWARDEN_IMAGE}
    container_name: ${VAULTWARDEN_CONTAINER_NAME}
    restart: ${RESTART_POLICY}

    volumes:
      - ${VAULTWARDEN_DATA_DIR}:/data

    environment:
      TZ: ${TZ}
      DOMAIN: https://${VAULTWARDEN_HOST}
      SIGNUPS_ALLOWED: "false"
      INVITATIONS_ALLOWED: "true"
      WEBSOCKET_ENABLED: "true"
      LOG_LEVEL: info
      EXTENDED_LOGGING: "true"
      LOG_FILE: /data/vaultwarden.log
      ADMIN_TOKEN: ${VAULTWARDEN_ADMIN_TOKEN}

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${PROXY_NETWORK}"

      - "traefik.http.routers.vaultwarden.rule=Host(`${VAULTWARDEN_HOST}`)"
      - "traefik.http.routers.vaultwarden.entrypoints=web"
      - "traefik.http.routers.vaultwarden.service=vaultwarden"

      - "traefik.http.services.vaultwarden.loadbalancer.server.port=80"

      - "traefik.http.routers.vaultwarden.middlewares=gzip@file"

    networks:
      - proxy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/alive"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  proxy:
    external: true
    name: ${PROXY_NETWORK}
